[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hermeneus-prosvasis"
version = "0.1.0"
description = "Greek corpus aggregation and indexing for Hermeneus"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
hermeneus-prosvasis = "hermeneus_prosvasis.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
