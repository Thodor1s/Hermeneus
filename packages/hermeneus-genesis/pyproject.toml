[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hermeneus-genesis"
version = "0.1.0"
description = "Greek-only training and retrieval baseline for Hermeneus"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
hermeneus-genesis = "hermeneus_genesis.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
